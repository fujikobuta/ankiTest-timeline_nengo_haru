        <div id="decade-section" class="vertical-column">
            <div id="decade-grid">
                <!-- 00, 10, ..., 90 -->
            </div>
        </div>

                <!-- 0, 1, ..., 9 -->

        <!-- 判定オーバーレイ -->
        <div id="judge-overlay"></div>

        <!-- 選択肢オーバーレイ（逆引きモード用） -->

            <div id="choice-container"></div>
        </div>
    </div>

    <!-- 下部：スリム操作パネル -->
