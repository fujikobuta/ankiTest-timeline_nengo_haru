    <div id="container">
        <!-- 左側：世紀カラム -->
        <div id="timeline-wrapper" class="vertical-column">
            <!-- JSで動的に生成 -->
        </div>

        <!-- 中央1：年代カラム -->
        <div id="decade-section" class="vertical-column">
            <div id="decade-grid">
                <!-- 00, 10, ..., 90 -->
            </div>
        </div>

        <!-- 中央2：年カラム -->
        <div id="year-section" class="vertical-column">
            <div id="year-grid">
                <!-- 0, 1, ..., 9 -->
            </div>
        </div>

        <!-- 右側：メイン表示エリア（ラベルが溜まる場所） -->
        <div id="main-display-area">
            <!-- ここに年号ラベルが表示される -->
        </div>

        <!-- 判定オーバーレイ -->
        <div id="judge-overlay"></div>
    </div>

    <!-- 下部：スリム操作パネル -->
    <div id="bottom-panel">
        <!-- 上段：問題と年号表示 -->
        <div class="panel-row">
            <div id="question-text">読み込み中...</div>
            <div id="selected-year-display">???? 年</div>
        </div>
        <!-- 下段：ボタンと進捗 -->
        <div class="panel-row">
            <div id="button-group">
                <button id="ng-button">NG</button>
                <button id="ok-button" disabled>OK</button>
            </div>
            <div id="progress-counter">0 / 0</div>
        </div>
    </div>
