<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronos Chart - 歴史年号タイムライン暗記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <!-- 左側：世紀カラム -->
        <div id="timeline-wrapper" class="vertical-column">
            <!-- JSで動的に生成 -->
        </div>

        <!-- 中央1：年代カラム -->
        <div id="decade-section" class="vertical-column">
            <div id="decade-grid">
                <!-- 00, 10, ..., 90 -->
            </div>
        </div>

        <!-- 中央2：年カラム -->
        <div id="year-section" class="vertical-column">
            <div id="year-grid">
                <!-- 0, 1, ..., 9 -->
            </div>
        </div>

        <!-- 右側：メイン表示エリア（ラベルが溜まる場所） -->
        <div id="main-display-area">
            <!-- ここに年号ラベルが表示される -->
        </div>

        <!-- 判定オーバーレイ -->
        <div id="judge-overlay"></div>
    </div>

    <!-- 下部：スリム操作パネル -->
    <div id="bottom-panel">
        <!-- 上段：問題と年号表示 -->
        <div class="panel-row">
            <div id="question-text">読み込み中...</div>
            <div id="selected-year-display">???? 年</div>
        </div>
        <!-- 下段：ボタンと進捗 -->
        <div class="panel-row">
            <div id="button-group">
                <button id="ng-button">NG</button>
                <button id="ok-button" disabled>OK</button>
            </div>
            <div id="progress-counter">0 / 0</div>
        </div>
    </div>

    <!-- データ埋め込み用スクリプト -->
    <script id="question-data" type="application/json">

    <script src="app.js"></script>
</body>
</html>
